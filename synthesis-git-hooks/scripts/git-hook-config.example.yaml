# synthesis-engineering git-hook policy — template.
#
# Copy this file to ~/.synthesis/git-hook-config.yaml and customize the
# fields marked YOUR-PERSONAL-ORG / YOUR-CLIENT-NAME / YOUR-INTERNAL-URL.
#
# The installer (install.sh) does this copy automatically if no config exists.
#
# Schema reference: ~/.synthesis/git-hooks/README.md
# Distributable form: github.com/synthesisengineering/synthesis-skills/synthesis-git-hooks

config_version: 1

# A repo classifies as `personal` when EVERY push remote URL matches at least
# one of these regex patterns (case-insensitive). Otherwise it classifies as
# `strict` and Tier 1 patterns apply.
#
# Replace YOUR-PERSONAL-ORG with your actual GitHub user/org name (the namespace
# under which all your sole-owner private repos live).
personal_remote_patterns:
  - '[:/]YOUR-PERSONAL-ORG/'

# ─── Tier 0 — credentials. ALWAYS run regardless of repo class. ───────────
# A private repo can flip to public in one click; credentials shouldn't be in
# git at all. Defense in depth.
tier_0_always:
  api_keys:
    - 'AKIA[0-9A-Z]{16}'                   # AWS access key ID
    - 'sk-[a-zA-Z0-9]{20}T3BlbkFJ'         # OpenAI API key
    - 'sk-ant-api[a-zA-Z0-9-]+'            # Anthropic API key
    - 'AIza[0-9A-Za-z_-]{35}'              # Google API key
    - 'ghp_[a-zA-Z0-9]{36}'                # GitHub personal access token
    - 'glpat-[a-zA-Z0-9_-]{20}'            # GitLab personal access token
    - 'xoxb-[0-9]+-[a-zA-Z0-9]+'           # Slack bot token
    - 'xoxp-[0-9]+-[a-zA-Z0-9]+'           # Slack user token
  private_key_markers:
    - 'BEGIN RSA PRIVATE KEY'
    - 'BEGIN OPENSSH PRIVATE KEY'
    - 'BEGIN EC PRIVATE KEY'
    - 'BEGIN PGP PRIVATE KEY'

# ─── Tier 1 — exposure-sensitive. Skipped in `personal` repos. ───────────
# These patterns are LEGITIMATE in repos only you read (personal notes, private
# knowledge bases) but should NEVER appear in public or multi-tenant repos.
tier_1_strict_only:

  # Financial signals — embarrassing if a colleague or competitor reads them.
  financial:
    - '\$[0-9]+[Kk]'
    - '\bsalary\b'
    - '\bbonus\b'
    - '\bcompensation\b'

  # HR / employment signals — same exposure model as financial.
  hr_employment:
    - 'contract renewal'
    - 'not renewing'
    - 'job search'
    - 'leadership criticism'
    - 'my boss'

  # Confidentiality markers — explicit OPSEC for outward-facing artifacts.
  # Word-boundary anchors so "confidential" doesn't trip on the legitimate
  # technical term "confidentiality" (Python class names, JSON keys, etc.).
  confidentiality_markers:
    - '\bconfidential\b'
    - '\bNDA\b'
    - '\bproprietary\b'

  # Confidential client / company names. Add your own. Examples:
  #   - 'acme-corp'
  #   - 'example-client'
  confidential_names: []

  # Private/shared skill names. Add the names of skills from your private
  # synthesis-skills repos that should not appear in public docs. Examples:
  #   - 'YOUR-PERSONAL-ORG-private-some-skill'
  #   - 'YOUR-CLIENT-NAME-internal-skill'
  private_skill_names: []

  # Internal URLs / repo references that must not leak into public docs.
  # Examples:
  #   - 'github\.com/YOUR-CLIENT-ORG'
  #   - 'internal\.YOUR-CLIENT-DOMAIN'
  #   - 'ai-knowledge-YOUR-CLIENT-NAME'
  internal_urls: []

# ─── Allowlist — lines that legitimately match a pattern above. ──────────
# SPDX-style license declarations in package manifests look like
# confidentiality markers ("Proprietary") but are structured metadata.
allowlist_lines:
  - '^\+[[:space:]]*"?license"?:[[:space:]]*"?(Proprietary|MIT|Apache|Apache-2\.0|GPL|GPL-2\.0|GPL-3\.0|LGPL|LGPL-2\.0|LGPL-3\.0|BSD|BSD-2-Clause|BSD-3-Clause|ISC|Unlicense|MPL-2\.0|CC0-1\.0|All Rights Reserved)"?,?[[:space:]]*$'

# Paths to exclude from the diff scan. The engine has built-in defaults for
# files whose entire purpose is the pattern catalog itself (the policy YAML,
# the example template, the anti-shortcut catalog, repo-local `.githooks/`
# files). Add paths whose ENTIRE PURPOSE is methodology documentation that
# discusses the patterns by example.
diff_exclude_paths:
  - '(^|/)synthesis-git-hooks/'
  - '(^|/)synthesis-anti-shortcuts/'
  # Bundled skill packs (e.g. Ragbot's synthesis_engine.skills.starter_pack)
  # legitimately discuss confidentiality / safety patterns in their bodies —
  # that's the skill's curriculum, not a leak. Add similar directories as
  # you create methodology-doc skills.
  - '(^|/)skills/starter_pack/'
  # Modules whose job is to enforce / classify the patterns themselves
  # (e.g. Ragbot's synthesis_engine.policy package). Their docstrings and
  # tests must mention "confidential" in technical context.
  - '(^|/)synthesis_engine/policy/'
  - '(^|/)test_policy\.py$'
  - '(^|/)test_memory_cross_workspace\.py$'

# Check commit messages (in addition to staged diffs) for `strict` repos.
# Disabled in `personal` repos because the same logic that allows the words
# in the diff applies to the message.
check_commit_message: true
